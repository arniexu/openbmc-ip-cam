BBPATH .= ":${LAYERDIR}"

BBFILE_COLLECTIONS += "evb_common"
BBFILE_PATTERN_evb_common = "^${LAYERDIR}/"
BBFILE_PATTERN_IGNORE_EMPTY_evb_common = "1"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

# Limit EVB camera builds to the reduced phosphor recipe set without modifying meta-phosphor.
BBMASK:append = " \
	.*/meta-phosphor/recipes-phosphor/bios/biosconfig-manager_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/console/obmc-console_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/inventory/phosphor-inventory-manager-assettag\\.bb|\
	.*/meta-phosphor/recipes-phosphor/inventory/phosphor-inventory-manager_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/libcper/libcper_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/libmctp/libmctp_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/libpldm/libpldm_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/pldm/pldm_git\\.bb|\
	.*/meta-phosphor/recipes-phosphor/smbios/smbios-mdr_git\\.bb \
"

LAYERSERIES_COMPAT_evb_common = "whinlatter walnascar"
#@TYPE: Machine
#@NAME: EVB OK3568-C (64bit)
#@DESCRIPTION: OpenBMC EVB machine configuration for Forlinx OK3568-C in 64-bit mode

MACHINEOVERRIDES =. "ok3568c:rk3568:"

require conf/machine/rockchip-rk3568-evb.conf

# Use OpenBMC MMC image/profile for SD card or eMMC boot media.
require conf/distro/include/phosphor-mmc.inc
require conf/machine/include/obmc-bsp-common.inc

# First-stage bring-up reuses the RK3568 EVB device tree on the Rockchip 6.1 baseline.
# Replace this with an OK3568-C-specific DTB once the 6.1 board DTS is landed.
KERNEL_DEVICETREE = "rockchip/rk3568-ok3568-c.dtb"

# First-stage U-Boot keeps the known-good RK3568 EVB defconfig.
UBOOT_MACHINE = "rk3568_defconfig"
RK_UBOOT_CFG = "rk3568"

include conf/machine/include/obmc-evb-common.inc